services:
  postgres:
    image: postgres:16-alpine
    container_name: finerag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finerag
      POSTGRES_PASSWORD: finerag_dev_password
      POSTGRES_DB: finerag
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: finerag-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: finerag-etcd
    restart: unless-stopped
    command: >-
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - etcd_data:/etcd

  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: finerag-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "19091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: finerag-prometheus
    restart: unless-stopped
    ports:
      - "19090:9090"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: finerag-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    ports:
      - "13000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  finerag-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: finerag-backend
    restart: unless-stopped
    environment:
      FINE_RAG_HTTP_ADDR: ":8080"
      FINE_RAG_JWT_SECRET: "change-me-in-production"
      FINE_RAG_TOKEN_TTL: "8h"
      FINE_RAG_ALLOWED_ORIGINS: "https://finer.shafeeq.dev,https://dash-finer.shafeeq.dev,http://localhost:14173,http://localhost:14174"
      FINE_RAG_RATE_LIMIT_PER_MIN: "240"
      FINE_RAG_DB_PROVIDER: "postgres"
      FINE_RAG_DATABASE_URL: "postgres://finerag:finerag_dev_password@postgres:5432/finerag?sslmode=disable"
      FINE_RAG_VECTOR_PROVIDER: "milvus"
      FINE_RAG_MILVUS_ENDPOINT: "milvus:19530"
      FINE_RAG_MILVUS_DATABASE: "finerag"
      FINE_RAG_MILVUS_COLLECTION: "tenant_vectors"
      FINE_RAG_MILVUS_TLS: "true"
      FINE_RAG_GATEWAY_PROVIDER: "stub"
      FINE_RAG_MINIO_PUBLIC_BASE_URL: "http://minio:9000"
      FINE_RAG_MINIO_BUCKET: "finerag-ingestion"
      FINE_RAG_BOOTSTRAP_ADMIN_USERNAME: "admin"
      FINE_RAG_BOOTSTRAP_ADMIN_PASSWORD: "sk-1234"
      FINE_RAG_BOOTSTRAP_ADMIN_API_KEY: "sk-1234"
      FINE_RAG_BOOTSTRAP_TENANT_ID: "tenant-a"
      FINE_RAG_BOOTSTRAP_TENANT_NAME: "Tenant A"
    depends_on:
      - postgres
      - milvus
      - minio
    ports:
      - "18080:8080"

  ingestion-dashboard-ui:
    build:
      context: ./ingestion-dashboard-ui
    container_name: finerag-ingestion-dashboard-ui
    restart: unless-stopped
    ports:
      - "14173:80"
    depends_on:
      - finerag-backend

  search-query-ui:
    build:
      context: ./search-query-ui
    container_name: finerag-search-query-ui
    restart: unless-stopped
    ports:
      - "14174:80"
    depends_on:
      - finerag-backend

volumes:
  postgres_data:
  minio_data:
  etcd_data:
  milvus_data:
  grafana_data:
